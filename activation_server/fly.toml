# fly.toml — Fly.io deployment for FreeSystemDoctor Pro activation server
# Deploy:  flyctl launch  (first time, creates app)
#          flyctl deploy   (subsequent)

app = "fsd-activation"
primary_region = "waw"   # Warsaw — lowest latency for PL customers

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////data/fsd.db"
  SENDER_EMAIL = "FreeSystemDoctor <noreply@freesystemdoctor.pl>"
  SUPPORT_EMAIL = "support@freesystemdoctor.pl"

[[mounts]]
  source = "fsd_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0    # scale to zero when idle (free tier)
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
